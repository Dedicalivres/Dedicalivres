<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dédicalivres</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- LOGIN -->
<section id="login">
  <h1>Admin</h1>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button id="loginBtn">Connexion</button>
  <p id="loginMsg"></p>
</section>

<!-- DASHBOARD -->
<section id="admin" class="hidden">

<header>
  <h1>Supervision</h1>
  <button id="logoutBtn">Déconnexion</button>
</header>

<div class="stats">
  <div><span>À valider</span><strong id="pending">0</strong></div>
  <div><span>Publiés</span><strong id="published">0</strong></div>
  <div><span>Total</span><strong id="total">0</strong></div>
</div>

<div class="filters">
  <input id="search" placeholder="Recherche...">
  <select id="status">
    <option value="pending">À valider</option>
    <option value="published">Publiés</option>
    <option value="all">Tous</option>
  </select>
</div>

<div id="list"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>

</body>
</html>
