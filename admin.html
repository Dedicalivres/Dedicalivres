<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Dédicalivres — Admin V7 Cyber Dashboard</title>

  <meta
    name="robots"
    content="noindex,nofollow"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="admin.css"
  />
</head>

<body>

  <!-- LOGIN -->

  <section
    id="login-screen"
    class="login-screen"
  >

    <div class="login-card">

      <div class="cyber-glow"></div>

      <div class="login-top">
        <div class="login-kicker">
          DÉDICALIVRES
        </div>

        <h1>
          CYBER ADMIN V7
        </h1>

        <p>
          Supervision temps réel de la plateforme.
        </p>
      </div>

      <div class="login-form">

        <input
          id="admin-email"
          type="email"
          placeholder="Email administrateur"
          autocomplete="email"
        />

        <input
          id="admin-password"
          type="password"
          placeholder="Mot de passe"
          autocomplete="current-password"
        />

        <button
          id="login-btn"
          class="cyber-btn primary"
          type="button"
        >
          ACCÉDER AU SYSTÈME
        </button>

        <p id="login-feedback"></p>

      </div>

    </div>

  </section>

  <!-- DASHBOARD -->

  <main
    id="dashboard"
    class="dashboard hidden"
  >

    <!-- HEADER -->

    <header class="dashboard-header">

      <div class="dashboard-title-wrap">

        <div class="dashboard-kicker">
          DÉDICALIVRES
        </div>

        <h1>
          CYBER DASHBOARD V7
        </h1>

      </div>

      <div class="dashboard-actions">

        <button
          id="refresh-btn"
          class="cyber-btn"
          type="button"
        >
          ⟳ Actualiser
        </button>

        <button
          id="logout-btn"
          class="cyber-btn danger"
          type="button"
        >
          Déconnexion
        </button>

      </div>

    </header>

    <!-- STATS -->

    <section class="stats-grid">

      <article class="stat-card">
        <div class="stat-label">
          ÉVÉNEMENTS
        </div>

        <div
          id="stat-events"
          class="stat-value"
        >
          --
        </div>
      </article>

      <article class="stat-card pending">
        <div class="stat-label">
          EN ATTENTE
        </div>

        <div
          id="stat-pending"
          class="stat-value"
        >
          --
        </div>
      </article>

      <article class="stat-card visits">
        <div class="stat-label">
          VISITES
        </div>

        <div
          id="stat-visits"
          class="stat-value"
        >
          --
        </div>
      </article>

      <article class="stat-card newsletter">
        <div class="stat-label">
          NEWSLETTER
        </div>

        <div
          id="stat-newsletter"
          class="stat-value"
        >
          --
        </div>
      </article>

    </section>

    <!-- FILTRES -->

    <section class="filters-panel">

      <div class="filters-grid">

        <input
          id="admin-search"
          type="search"
          placeholder="Recherche événement, ville, région..."
        />

        <select id="admin-filter-type">
          <option value="">
            Tous les types
          </option>

          <option>
            Salon
          </option>

          <option>
            Festival
          </option>

          <option>
            Dédicace
          </option>

          <option>
            Autre
          </option>
        </select>

        <select id="admin-filter-status">
          <option value="">
            Tous les statuts
          </option>

          <option value="pending">
            En attente
          </option>

          <option value="validated">
            Validés
          </option>

          <option value="featured">
            Mis en avant
          </option>
        </select>

      </div>

    </section>

    <!-- CHARTS -->

    <section class="charts-grid">

      <article class="chart-card">
        <div class="chart-title">
          Répartition des événements
        </div>

        <canvas id="types-chart"></canvas>
      </article>

      <article class="chart-card">
        <div class="chart-title">
          Évolution des visites
        </div>

        <canvas id="visits-chart"></canvas>
      </article>

    </section>

    <!-- EVENTS -->

    <section class="events-layout">

      <!-- PENDING -->

      <section class="events-column">

        <div class="column-title pending">
          VALIDATION
        </div>

        <div
          id="pending-events"
          class="events-list"
        ></div>

      </section>

      <!-- VALIDATED -->

      <section class="events-column">

        <div class="column-title validated">
          ÉVÉNEMENTS VALIDÉS
        </div>

        <div
          id="validated-events"
          class="events-list"
        ></div>

      </section>

    </section>

  </main>

  <!-- LIBS -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="config.js"></script>

  <script src="admin.js"></script>

</body>
</html>
