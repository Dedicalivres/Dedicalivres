<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dédicalivres — Admin V8 Cyber Control</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <link rel="stylesheet" href="admin.css" />
</head>

<body class="cyber-admin">

  <!-- LOGIN -->
  <section id="login-screen" class="login-screen">

    <div class="login-panel">

      <div class="cyber-logo-wrap">
        <img src="logo.png" alt="Dédicalivres" class="cyber-logo">
      </div>

      <h1>ADMIN CONTROL V8</h1>

      <p class="login-subtitle">
        Supervision temps réel • Validation • Analytics • Cartographie
      </p>

      <form id="login-form" class="login-form">

        <input
          id="email"
          type="email"
          placeholder="Email administrateur"
          required
        />

        <input
          id="password"
          type="password"
          placeholder="Mot de passe"
          required
        />

        <button type="submit" class="cyber-btn-primary">
          CONNEXION
        </button>

      </form>

      <div id="login-feedback" class="login-feedback"></div>

    </div>

  </section>

  <!-- DASHBOARD -->
  <main id="dashboard" class="dashboard hidden">

    <!-- TOPBAR -->
    <header class="topbar">

      <div class="topbar-left">

        <div class="status-dot"></div>

        <div>
          <h2>CYBER DASHBOARD</h2>
          <p>Supervision temps réel Dédicalivres</p>
        </div>

      </div>

      <div class="topbar-right">

        <button id="refresh-btn" class="cyber-btn-secondary">
          Actualiser
        </button>

        <button id="logout-btn" class="cyber-btn-danger">
          Déconnexion
        </button>

      </div>

    </header>

    <!-- STATS -->
    <section class="stats-grid">

      <article class="stat-card glow-green">
        <span class="stat-label">ÉVÉNEMENTS</span>
        <strong id="stats-events">0</strong>
      </article>

      <article class="stat-card glow-cyan">
        <span class="stat-label">EN ATTENTE</span>
        <strong id="stats-pending">0</strong>
      </article>

      <article class="stat-card glow-orange">
        <span class="stat-label">NEWSLETTER</span>
        <strong id="stats-newsletter">0</strong>
      </article>

      <article class="stat-card glow-purple">
        <span class="stat-label">VISITES</span>
        <strong id="stats-visits">0</strong>
      </article>

    </section>

    <!-- FILTERS -->
    <section class="toolbar">

      <input
        type="search"
        id="search-input"
        placeholder="Recherche événement..."
      />

      <select id="filter-status">
        <option value="">Tous</option>
        <option value="pending">En attente</option>
        <option value="validated">Validés</option>
        <option value="featured">Mis en avant</option>
      </select>

      <select id="filter-type">
        <option value="">Tous types</option>
        <option value="Salon">Salon</option>
        <option value="Festival">Festival</option>
        <option value="Dédicace">Dédicace</option>
        <option value="Autre">Autre</option>
      </select>

    </section>

    <!-- LIVE MAP -->
    <section class="admin-map-section">

      <div class="section-head">
        <h3>CARTE LIVE</h3>
        <span>Surveillance géographique</span>
      </div>

      <div id="admin-map"></div>

    </section>

    <!-- EVENTS -->
    <section class="events-section">

      <div class="section-head">
        <h3>SUPERVISION ÉVÉNEMENTS</h3>
        <span id="events-count">0 éléments</span>
      </div>

      <div id="events-container" class="events-container"></div>

    </section>

  </main>

  <!-- TOAST -->
  <div id="toast-container" class="toast-container"></div>

  <!-- MODAL EDIT -->
  <div id="edit-modal" class="edit-modal hidden">

    <div class="edit-panel">

      <div class="edit-header">
        <h3>ÉDITION ÉVÉNEMENT</h3>

        <button id="close-edit-modal" class="close-modal">
          ✕
        </button>
      </div>

      <form id="edit-form" class="edit-form">

        <input type="hidden" id="edit-id" />

        <div class="form-grid">

          <input id="edit-title" placeholder="Titre" />

          <select id="edit-type">
            <option>Salon</option>
            <option>Festival</option>
            <option>Dédicace</option>
            <option>Autre</option>
          </select>

          <input id="edit-city" placeholder="Ville" />
          <input id="edit-region" placeholder="Région" />

          <input id="edit-start-date" type="date" />
          <input id="edit-end-date" type="date" />

          <input id="edit-website" placeholder="Site officiel" />

        </div>

        <textarea
          id="edit-description"
          rows="6"
          placeholder="Description"
        ></textarea>

        <div class="edit-actions">

          <button
            type="button"
            id="save-edit-btn"
            class="cyber-btn-primary"
          >
            ENREGISTRER
          </button>

        </div>

      </form>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="config.js"></script>

  <script src="admin.js"></script>

</body>
</html>
