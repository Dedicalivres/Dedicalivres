<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dédicalivres V2</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="admin-upgrade.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="admin-header">
  <h1>📚 Admin Dédicalivres</h1>
  <button id="refresh-btn">🔄 Rafraîchir</button>
</header>

<main class="admin-container">

  <!-- STATS -->
  <section class="admin-stats">
    <div class="stat">
      <span id="stat-total">0</span>
      <small>Total événements</small>
    </div>

    <div class="stat">
      <span id="stat-pending">0</span>
      <small>En attente</small>
    </div>

    <div class="stat">
      <span id="stat-featured">0</span>
      <small>Mis en avant</small>
    </div>
  </section>

  <!-- FILTRES -->
  <section class="admin-filters">
    <input id="search-admin" placeholder="Rechercher..." />

    <select id="filter-status">
      <option value="">Tous</option>
      <option value="pending">En attente</option>
      <option value="validated">Validé</option>
    </select>

    <select id="filter-region">
      <option value="">Toutes régions</option>
    </select>
  </section>

  <!-- TABLE -->
  <section class="admin-table">
    <table>
      <thead>
        <tr>
          <th>Titre</th>
          <th>Ville</th>
          <th>Date</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="admin-table-body">
        <tr><td colspan="5">Chargement...</td></tr>
      </tbody>
    </table>
  </section>

</main>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="close-modal">✖</span>

    <h2 id="modal-title"></h2>

    <p id="modal-description"></p>

    <div class="modal-actions">
      <button id="validate-btn">✔ Valider</button>
      <button id="reject-btn">❌ Rejeter</button>
      <button id="feature-btn">⭐ Mettre en avant</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="admin-v2.js"></script>

</body>
</html>
