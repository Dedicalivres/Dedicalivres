<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dédicalivres — Cyber Dashboard V6</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>
</head>

<body>

<div class="cyber-grid"></div>

<section id="login-screen" class="login-screen">

  <div class="login-card">

    <div class="cyber-logo">
      <span>DÉDICALIVRES</span>
      <small>CYBER DASHBOARD V6</small>
    </div>

    <h1>Connexion administrateur</h1>

    <input
      type="email"
      id="admin-email"
      placeholder="Email"
      autocomplete="email"
    />

    <input
      type="password"
      id="admin-password"
      placeholder="Mot de passe"
      autocomplete="current-password"
    />

    <button id="login-btn">
      ACCÉDER AU SYSTÈME
    </button>

    <p id="login-feedback"></p>

  </div>

</section>

<section id="dashboard" class="dashboard hidden">

<header class="topbar">

  <div class="topbar-left">

    <h2>CYBER ADMIN V6</h2>

    <p>
      Supervision intelligente temps réel
    </p>

  </div>

  <div class="topbar-right">

    <button id="refresh-btn" class="cyber-btn">
      Actualiser
    </button>

    <button id="logout-btn" class="cyber-btn danger">
      Déconnexion
    </button>

  </div>

</header>

<section class="stats-grid">

  <article class="stat-card green">
    <span class="stat-label">Événements</span>
    <strong id="stat-events">0</strong>
  </article>

  <article class="stat-card cyan">
    <span class="stat-label">En attente</span>
    <strong id="stat-pending">0</strong>
  </article>

  <article class="stat-card orange">
    <span class="stat-label">Visites</span>
    <strong id="stat-visits">0</strong>
  </article>

  <article class="stat-card purple">
    <span class="stat-label">Newsletter</span>
    <strong id="stat-newsletter">0</strong>
  </article>

</section>

<section class="analytics-grid">

  <div class="panel chart-panel">

    <div class="panel-header">
      <h3>Types d’événements</h3>
    </div>

    <canvas id="types-chart"></canvas>

  </div>

  <div class="panel chart-panel">

    <div class="panel-header">
      <h3>Activité plateforme</h3>
    </div>

    <canvas id="visits-chart"></canvas>

  </div>

</section>

<section class="dashboard-grid">

  <div class="panel">

    <div class="panel-header">
      <h3>Validation rapide</h3>
    </div>

    <div id="pending-events" class="events-list"></div>

  </div>

  <div class="panel">

    <div class="panel-header">
      <h3>Événements validés</h3>
    </div>

    <div id="validated-events" class="events-list"></div>

  </div>

</section>

</section>

<script src="admin.js"></script>

</body>
</html>
