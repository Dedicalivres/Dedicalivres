<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Admin Dédicalivres</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f7f1fb;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .panel {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 20px 50px rgba(0,0,0,.1);
      text-align: center;
    }

    input {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: #ff6b35;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .hidden { display: none; }

    .message {
      margin-top: 10px;
      font-weight: 600;
    }

    .error { color: red; }
    .success { color: green; }

    .dashboard {
      width: 100%;
      max-width: 800px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .stat {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      text-align: center;
    }

    .stat strong {
      font-size: 28px;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-panel" class="panel">
  <h2>Admin</h2>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Mot de passe" />

  <button id="login-button">Connexion</button>

  <p id="login-message" class="message"></p>
</div>

<!-- DASHBOARD -->
<div id="admin-panel" class="dashboard hidden">

  <button id="logout-button" style="margin-bottom:20px;">Déconnexion</button>

  <h1>Dashboard</h1>

  <div class="stats">
    <div class="stat">
      Aujourd’hui
      <strong id="stat-today">—</strong>
    </div>

    <div class="stat">
      7 jours
      <strong id="stat-week">—</strong>
    </div>

    <div class="stat">
      Total
      <strong id="stat-total">—</strong>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>

</body>
</html>
